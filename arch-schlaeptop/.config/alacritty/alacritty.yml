# ~/.config/alacritty/alacritty.yml

env:
  TERM: xterm-256color

colors:
  primary:
    background: '0x000000'
    foreground: '0x00ffff'

  cursor:
    text: '0x000000'
    cursor: '0x00ffff'

  selection:
    text: '0x000000'
    background: '0xa9a9a9'

  search:
    matches:
      foreground: '0x000000'
      background: '0xffff00'
    focused_match:
      foreground: '0x000000'
      background: '0x00cdcd'

  normal:
    black:   '0x000000'
    red:     '0xcd0000'
    green:   '0x00cd00'
    yellow:  '0xcdcd00'
    blue:    '0x0000ee'
    magenta: '0xcd00cd'
    cyan:    '0x00cdcd'
    white:   '0xe5e5e5'

  bright:
    black:   '0x7f7f7f'
    red:     '0xff0000'
    green:   '0x00ff00'
    yellow:  '0xffff00'
    blue:    '0x5c5cff'
    magenta: '0xff00ff'
    cyan:    '0x00ffff'
    white:   '0xffffff'


scrolling:
  history: 10000
  multiplier: 3
