[font]
size = 16.0

[env]
TERM = "xterm-256color"

[colors.bright]
black = "0x7f7f7f"
blue = "0x5c5cff"
cyan = "0x00ffff"
green = "0x00ff00"
magenta = "0xff00ff"
red = "0xff0000"
white = "0xffffff"
yellow = "0xffff00"

[colors.cursor]
cursor = "0x00ffff"
text = "0x000000"

[colors.normal]
black = "0x000000"
blue = "0x0000ee"
cyan = "0x00cdcd"
green = "0x00cd00"
magenta = "0xcd00cd"
red = "0xcd0000"
white = "0xe5e5e5"
yellow = "0xcdcd00"

[colors.primary]
background = "0x000000"
foreground = "0x00ffff"

[colors.search.focused_match]
background = "0x00cdcd"
foreground = "0x000000"

[colors.search.matches]
background = "0xffff00"
foreground = "0x000000"

[colors.selection]
background = "0xa9a9a9"
text = "0x000000"

[scrolling]
history = 10000
multiplier = 3

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
